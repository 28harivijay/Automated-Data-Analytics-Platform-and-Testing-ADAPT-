{% extends 'base.html' %}
{% block page_styles %}
<style>
    body {
        background-color: var(--ghost-white);
    }

    main {
        padding-top: 30px;
    }

    .main-card {
        margin-top: -40px;
    }

    .home-doc-btn {
        border-radius: 8px;
    }
</style>
{% endblock %}
{% block content %}
    <header class="hero-section">
        <div class="container text-center">
            <h1 class="hero-title">Algorithmic Job Matching<br>Driven by Data.</h1>
            <p class="lead text-dim mx-auto mb-5" style="max-width: 650px;">
                InJobNet leverages Python-based analytics to bridge the gap between candidate skillsets and real-world market demand.
            </p>
            <div class="d-flex justify-content-center gap-3">
                <form action="{% url 'upload' %}" method="get" class="m-0">
                    <button type="submit" class="btn-action">Upload Skills</button>
                </form>
            </div>
        </div>
    </header>
{% endblock %}
